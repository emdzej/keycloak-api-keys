name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  # ── Java: build, test, publish to GitHub Packages Maven ─────────────────────
  publish-maven:
    name: Publish Maven packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # axion-release reads the full tag history

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Build and test
        run: ./gradlew build test --no-daemon

      - name: Verify resolved version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"   # strip leading 'v'
          GRADLE_VERSION=$(./gradlew currentVersion -q --no-daemon | sed 's/Project version: //')
          echo "Tag version : $VERSION"
          echo "Gradle version: $GRADLE_VERSION"
          if [ "$GRADLE_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch — tag is $VERSION but Gradle resolved $GRADLE_VERSION"
            exit 1
          fi

      - name: Publish SPI JAR
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :spi:publishSpiPublicationToGitHubPackagesRepository --no-daemon

      - name: Publish Spring package
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :packages:spring:publishSpringPublicationToGitHubPackagesRepository --no-daemon

      - name: Publish Spring WebFlux package
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :packages:spring-webflux:publishSpringWebfluxPublicationToGitHubPackagesRepository --no-daemon

  # ── Node: build, test, publish to GitHub Packages npm ───────────────────────
  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Set up Node (GitHub Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"
          scope: "@emdzej"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test
        run: pnpm build && pnpm test

      - name: Set package versions from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "Setting npm package versions to $VERSION"
          # Update each publishable package (not -demo packages)
          for pkg in packages/express packages/fastify packages/hono; do
            pnpm --filter "./$pkg" exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          done

      - name: Publish @emdzej/keycloak-api-keys-express
        working-directory: packages/express
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish --no-git-checks --access public

      - name: Publish @emdzej/keycloak-api-keys-fastify
        working-directory: packages/fastify
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish --no-git-checks --access public

      - name: Publish @emdzej/keycloak-api-keys-hono
        working-directory: packages/hono
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish --no-git-checks --access public

  # ── .NET: build, test, publish to GitHub Packages NuGet ─────────────────────
  publish-nuget:
    name: Publish NuGet package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
          source-url: "https://nuget.pkg.github.com/emdzej/index.json"
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test
        run: dotnet test packages/dotnet/KeycloakApiKeys.sln --configuration Release

      - name: Pack
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          dotnet pack packages/dotnet/src/KeycloakApiKeyAuthentication/KeycloakApiKeyAuthentication.csproj \
            --configuration Release \
            -p:Version="$VERSION" \
            --output packages/dotnet/nupkg

      - name: Publish to GitHub Packages NuGet
        run: |
          dotnet nuget push packages/dotnet/nupkg/*.nupkg \
            --source "https://nuget.pkg.github.com/emdzej/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
