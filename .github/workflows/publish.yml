name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:  # Manual trigger
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.1)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write  # Required for npm trusted publishing (OIDC)

jobs:
  # ── Java: build, test, publish to Maven Central + GitHub Packages ───────────
  publish-maven:
    name: Publish Maven packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # axion-release reads the full tag history

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Build and test
        run: ./gradlew build test --no-daemon

      - name: Verify resolved version matches tag
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG}"   # no v prefix — tags are plain semver (e.g. 0.1.0)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          GRADLE_VERSION=$(./gradlew currentVersion -q --no-daemon | sed 's/Project version: //' | tr -d '[:space:]')
          echo "Tag version : $VERSION"
          echo "Gradle version: $GRADLE_VERSION"
          if [ "$GRADLE_VERSION" != "$VERSION" ]; then
            echo "::warning::Version mismatch — input is $VERSION but Gradle resolved $GRADLE_VERSION (continuing anyway for manual dispatch)"
          fi

      # ── Publish to Maven Central ──
      - name: Publish SPI to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew :spi:publishSpiPublicationToMavenCentralRepository --no-daemon

      - name: Publish Spring to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew :packages:spring:publishSpringPublicationToMavenCentralRepository --no-daemon

      - name: Publish Spring WebFlux to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew :packages:spring-webflux:publishSpringWebfluxPublicationToMavenCentralRepository --no-daemon

  # ── Node: build, test, publish to npmjs.org (trusted publishing) ────────────
  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test
        run: pnpm build && pnpm test

      - name: Set package versions from release tag
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG}"
          fi
          echo "Setting npm package versions to $VERSION"
          # Update each publishable package (not -demo packages)
          for pkg in packages/express packages/fastify packages/hono; do
            pnpm --filter "./$pkg" exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          done

      - name: Publish @emdzej/keycloak-api-keys-express
        working-directory: packages/express
        run: npm publish --access public --provenance

      - name: Publish @emdzej/keycloak-api-keys-fastify
        working-directory: packages/fastify
        run: npm publish --access public --provenance

      - name: Publish @emdzej/keycloak-api-keys-hono
        working-directory: packages/hono
        run: npm publish --access public --provenance

  # ── .NET: build, test, publish to NuGet.org + GitHub Packages ────────────────
  publish-nuget:
    name: Publish NuGet package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Build and test
        run: dotnet test packages/dotnet/KeycloakApiKeys.sln --configuration Release

      - name: Pack
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG}"
          fi
          dotnet pack packages/dotnet/src/KeycloakApiKeyAuthentication/KeycloakApiKeyAuthentication.csproj \
            --configuration Release \
            -p:Version="$VERSION" \
            --output packages/dotnet/nupkg

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push packages/dotnet/nupkg/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Publish to GitHub Packages NuGet
        run: |
          dotnet nuget push packages/dotnet/nupkg/*.nupkg \
            --source "https://nuget.pkg.github.com/emdzej/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
