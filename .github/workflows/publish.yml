name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.1)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── Java: build, test, publish to Maven Central (vanniktech plugin) ─────────
  publish-maven:
    name: Publish Maven packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Build and test
        run: ./gradlew build test --no-daemon

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishAllPublicationsToMavenCentralRepository --no-daemon

  # ── Node: build, test, publish to npmjs.org (OIDC trusted publishing) ───────
  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test
        run: pnpm build && pnpm test

      - name: Set package versions
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          for pkg in packages/express packages/fastify packages/hono; do
            pnpm --filter "./$pkg" exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          done

      - name: Publish @emdzej/keycloak-api-keys-express
        working-directory: packages/express
        run: npm publish --access public --provenance

      - name: Publish @emdzej/keycloak-api-keys-fastify
        working-directory: packages/fastify
        run: npm publish --access public --provenance

      - name: Publish @emdzej/keycloak-api-keys-hono
        working-directory: packages/hono
        run: npm publish --access public --provenance

  # ── .NET: build, test, publish to NuGet.org ─────────────────────────────────
  publish-nuget:
    name: Publish NuGet package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Build and test
        run: dotnet test packages/dotnet/KeycloakApiKeys.sln --configuration Release

      - name: Pack
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG}"
          fi
          dotnet pack packages/dotnet/src/KeycloakApiKeyAuthentication/KeycloakApiKeyAuthentication.csproj \
            --configuration Release \
            -p:Version="$VERSION" \
            --output packages/dotnet/nupkg

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push packages/dotnet/nupkg/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate
