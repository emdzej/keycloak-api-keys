<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5A6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Key body -->
  <rect x="20" y="40" width="45" height="20" rx="3" fill="url(#keyGradient)"/>
  <!-- Key head (circle) -->
  <circle cx="75" cy="50" r="18" fill="none" stroke="url(#keyGradient)" stroke-width="8"/>
  <!-- Key teeth -->
  <rect x="20" y="55" width="8" height="10" fill="url(#keyGradient)"/>
  <rect x="32" y="55" width="6" height="8" fill="url(#keyGradient)"/>
  <rect x="42" y="55" width="6" height="12" fill="url(#keyGradient)"/>
</svg>
